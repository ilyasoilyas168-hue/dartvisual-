name: Build DartVisual
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Unzip mod
        run: unzip DartVisual-mod-src.zip
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build mod
        run: |
          ls -lascd dartvisual
          ls -chmod +x gradlew
          ./gradlew build
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: DartVisual-mod
          path: dartvisual/build/libs/*.jar
